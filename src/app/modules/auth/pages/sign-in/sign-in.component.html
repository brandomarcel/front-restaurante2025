<!-- login form -->

<ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="large" color="#001c71" type="ball-scale-multiple" [fullScreen]="true">
  <p style="color: #f5ae1c"> Cargando... </p>
</ngx-spinner>
<form class="my-8 space-y-6" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="text-center">
    <h2 class="text-foreground mb-1 text-3xl font-semibold">Iniciar sesión <span class="text-primary">POS</span></h2>
    <p class="text-muted-foreground text-sm">Accede para facturar, cobrar y controlar tu caja.</p>
  </div>

  <!-- <div class="grid grid-cols-3 gap-2 rounded-lg bg-primary/5 p-2 text-center text-[11px] font-medium">
    <div class="rounded-md bg-white py-1 text-primary ring-1 ring-primary/15">Facturación</div>
    <div class="rounded-md bg-white py-1 text-primary ring-1 ring-primary/15">POS</div>
    <div class="rounded-md bg-white py-1 text-primary ring-1 ring-primary/15">Caja</div>
  </div> -->

  <div class="space-y-3 text-left">
    <div class="form__group">
      <div class="relative">
        <input
          type="email"
          id="email"
          [ngClass]="{ 'is__invalid-input': submitted && f['email'].errors }"
          class="peer block"
          placeholder=" "
          formControlName="email"
          autocomplete="email" />
        <label
          for="email"
          [ngClass]="{ 'peer-focus:text-destructive!': submitted && f['email'].errors }"
          class="bg-background text-muted-foreground peer-focus:text-primary absolute top-2 z-10 origin-[0] -translate-y-4 scale-95 transform px-2 text-sm duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 ltr:left-1 rtl:right-1">
          Usuario o Correo
        </label>
      </div>
      <div *ngIf="submitted && f['email'].errors" class="is__invalid-error">
        <div *ngIf="f['email'].errors['required']">Campo obligatorio</div>
        <div *ngIf="f['email'].errors['email']">Debe ser un correo electrónico válido</div>
      </div>
    </div>

    <div class="form__group">
      <div class="relative">
        <input
          [type]="passwordTextType ? 'text' : 'password'"
          id="password"
          [ngClass]="{ 'is__invalid-input': submitted && f['password'].errors }"
          class="peer block"
          placeholder=" "
          formControlName="password"
          autocomplete="current-password" />
        <label
          for="password"
          [ngClass]="{ 'peer-focus:text-destructive!': submitted && f['password'].errors }"
          class="bg-background text-muted-foreground peer-focus:text-primary absolute top-2 z-10 origin-[0] -translate-y-4 scale-95 transform px-2 text-sm duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-95 peer-focus:px-2 ltr:left-1 rtl:right-1">
          Contraseña
        </label>
        <span
          class="text-muted-foreground absolute top-2 cursor-pointer ltr:right-3 rtl:left-3"
          (click)="togglePasswordTextType()">
          <svg-icon
            [src]="
              !passwordTextType
                ? 'assets/icons/heroicons/outline/eye-off.svg'
                : 'assets/icons/heroicons/outline/eye.svg'
            "
            [svgClass]="'h-5 w-5'">
          </svg-icon>
        </span>
      </div>
      <div *ngIf="submitted && f['password'].errors" class="is__invalid-error">
        <div *ngIf="f['password'].errors['required']">Campo obligatorio</div>
      </div>
    </div>
  </div>

  <!-- <div class="flex items-center justify-end">
    <a routerLink="/auth/forgot-password" class="text-xs font-medium text-primary hover:underline">
      ¿Olvidaste tu contraseña?
    </a>
  </div> -->

  <div>
    <app-button full impact="bold" tone="primary" shape="rounded" size="medium" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Ingresando...' : 'Iniciar sesión' }}
    </app-button>
  </div>

  <div class="text-muted-foreground flex items-center justify-center text-sm">
    ¿No tienes una cuenta?
    <app-button type="button" routerLink="/register-company" impact="none" tone="primary" shape="rounded"
      size="small">
      Registrate
    </app-button>
  </div>
</form>
