<div class="space-y-3" (mouseenter)="menuService.showSideBar = true">
  <div *ngFor="let menu of menuService.pagesMenu" class="space-y-1">
    <div *ngIf="menuService.showSideBar" class="px-2 pt-1">
      <small class="text-muted-foreground/60 text-[10px] font-semibold uppercase tracking-[0.12em]">
        {{ menu.group }}
      </small>
    </div>

    <ul class="flex flex-col gap-0.5 text-xs">
      <li *ngFor="let item of menu.items">
        <div
          (click)="item.children && toggleMenu(item)"
          [ngClass]="{
            'bg-primary/12 text-primary shadow-sm': item.active || item.expanded,
            'text-muted-foreground hover:bg-card hover:text-foreground': !(item.active || item.expanded),
            'justify-center px-0': !menuService.showSideBar
          }"
          class="group relative flex min-h-10 items-center gap-3 rounded-lg px-2.5 py-1.5 transition-all duration-200"
        >
          <span
            [ngClass]="(item.active || item.expanded) ? 'text-primary' : 'text-muted-foreground/60 group-hover:text-foreground'"
            class="inline-flex shrink-0 items-center justify-center"
          >
            <svg-icon [src]="item.icon || ''" [svgClass]="'h-5 w-5'"></svg-icon>
          </span>

          <ng-container
            [ngTemplateOutlet]="item.children ? childMenu : parentMenu"
            [ngTemplateOutletContext]="{ item: item }"
          ></ng-container>

          <button
            *ngIf="item.children && menuService.showSideBar"
            class="ml-auto inline-flex items-center justify-center text-muted-foreground/70 transition-transform duration-200"
            [ngClass]="{ 'rotate-180': item.expanded }"
            aria-label="Expandir submenu"
            type="button"
          >
            <!-- <svg-icon src="assets/icons/heroicons/outline/chevron-down.svg" svgClass="h-4 w-4"></svg-icon> -->
          </button>

          <div *ngIf="!menuService.showSideBar" class="menu-tooltip">
            {{ item.label }}
          </div>
        </div>

        <app-sidebar-submenu [submenu]="item"></app-sidebar-submenu>
      </li>
    </ul>

    <div class="py-2" *ngIf="menu.separator">
      <hr class="border-muted-foreground/20 border-dashed" />
    </div>
  </div>

  <ng-template #parentMenu let-item="item">
    <a
      [routerLink]="item.route"
      routerLinkActive="text-primary"
      [routerLinkActiveOptions]="{ exact: false }"
      [ngClass]="{ hidden: !menuService.showSideBar }"
      class="flex grow items-center truncate text-xs font-semibold"
    >
      {{ item.label }}
    </a>
  </ng-template>

  <ng-template #childMenu let-item="item">
    <span
      [ngClass]="{ hidden: !menuService.showSideBar }"
      class="flex grow items-center truncate text-xs font-semibold"
    >
      {{ item.label }}
    </span>
  </ng-template>
</div>
