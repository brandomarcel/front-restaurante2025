<div class="relative z-[100] ml-3" clickOutside (clickOutside)="isOpen = false">
  <div class="flex items-center gap-2">
    <span
      class="rounded-full border px-3 py-1 text-xs font-bold tracking-wide shadow-sm"
      [ngClass]="(ambiente$ | async) === 'PRODUCCION'
      ? 'border-green-300 bg-green-100 text-green-700'
      : 'border-yellow-300 bg-yellow-100 text-yellow-700'"
    >
      {{ (ambiente$ | async) || '—' }}
    </span>

    <button
      (click)="toggleMenu()"
      class="hover:bg-card relative flex items-center gap-2 rounded-xl border border-primary/15 bg-white px-1.5 py-1 text-sm shadow-sm transition"
      type="button"
    >
      <span class="sr-only">Abrir menú de usuario</span>
      <img class="size-8 shrink-0 rounded-lg" src="assets/images/userLogo.png" alt="Avatar de usuario" />
      <div class="hidden max-w-[120px] text-left lg:block">
        <p class="truncate text-xs font-semibold text-foreground">{{ user?.fullName || 'Usuario' }}</p>
        <p class="truncate text-[10px] text-muted-foreground">{{ roleLabel }}</p>
      </div>
      <svg-icon
        src="assets/icons/heroicons/outline/chevron-down.svg"
        [svgClass]="'h-4 w-4 text-muted-foreground transition-transform'"
        [ngClass]="{ 'rotate-180': isOpen }"
      ></svg-icon>
    </button>
  </div>

  <div
    [@openClose]="isOpen ? 'open' : 'closed'"
    class="bg-background border-muted shadow-custom absolute z-[120] mt-2 w-72 origin-top-right transform rounded-xl border border-dashed p-3 ring-1 ring-transparent ring-opacity-5 transition focus:outline-hidden ltr:right-0 rtl:left-0"
  >
    <div class="mb-3 rounded-lg bg-primary/5 p-3">
      <div class="flex items-center gap-3">
        <img class="size-10 rounded-lg" src="assets/images/userLogo.png" alt="Avatar de usuario" />
        <div class="min-w-0 text-sm">
          <p class="truncate font-semibold text-foreground">{{ user?.fullName || 'Usuario' }}</p>
          <p class="truncate text-xs text-muted-foreground">{{ user?.email || 'Sin correo' }}</p>
        </div>
      </div>
      <div class="mt-2 flex items-center gap-2">
        <span class="rounded px-2 py-0.5 text-[10px] font-semibold" [ngClass]="roleBadgeClass">
          {{ roleLabel }}
        </span>
        <span
          class="rounded px-2 py-0.5 text-[10px] font-semibold"
          [ngClass]="(ambiente$ | async) === 'PRODUCCION' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'"
        >
          {{ (ambiente$ | async) || '—' }}
        </span>
      </div>
    </div>

    <ul class="my-1 flex flex-col gap-1">
      @for (item of visibleProfileMenu; track $index) {
      <li
        [routerLink]="item.link"
        (click)="isOpen = false"
        class="text-muted-foreground hover:bg-card hover:text-primary inline-flex cursor-pointer items-center gap-2 rounded-lg px-2.5 py-2 text-xs font-semibold transition"
      >
        <svg-icon [src]="item.icon" [svgClass]="'h-5 w-5 text-muted-foreground/50'"></svg-icon>
        {{ item.title }}
      </li>
      }

      <li
        (click)="logout()"
        class="inline-flex cursor-pointer items-center gap-2 rounded-lg px-2.5 py-2 text-xs font-semibold text-rose-600 transition hover:bg-rose-50 hover:text-rose-700"
      >
        <svg-icon src="./assets/icons/heroicons/outline/logout.svg" [svgClass]="'h-5 w-5 text-rose-500'"></svg-icon>
        Cerrar Sesión
      </li>
    </ul>
  </div>
</div>
