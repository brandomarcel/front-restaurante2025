<div class="app-container space-y-4">
  <div class="rounded-2xl bg-gradient-to-r from-primary to-primary/80 px-4 py-5 text-primary-foreground shadow-lg">
    <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
      <div>
        <h2 class="text-xl font-bold">Productos Mas Vendidos</h2>
        <p class="text-xs text-primary-foreground/80">Ranking por rango de fechas.</p>
      </div>
      <app-button (click)="exportarExcel()" impact="bold" tone="success" shape="rounded" size="small">
        Descargar Excel
      </app-button>
    </div>
  </div>

  <div class="rounded-xl border border-primary/15 bg-white p-4 shadow-sm">
    <div class="grid grid-cols-1 gap-3 md:grid-cols-3 md:items-end">
      <div>
        <label class="mb-1 block text-xs font-semibold text-gray-600">Desde</label>
        <input type="date" [(ngModel)]="fromDate" class="input" />
      </div>
      <div>
        <label class="mb-1 block text-xs font-semibold text-gray-600">Hasta</label>
        <input type="date" [(ngModel)]="toDate" class="input" />
      </div>
      <div>
        <button (click)="cargarDatos()" class="btn btn-primary w-full md:w-auto">
          Buscar
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="rounded-lg bg-primary/5 px-3 py-2 text-sm text-primary">
    Cargando...
  </div>

  <ng-container *ngIf="!loading && data.length > 0; else emptyData">
    <div class="rounded-xl border border-primary/15 bg-white p-3 shadow-sm">
      <div class="mb-3 flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
        <div class="flex items-center gap-2">
          <span class="text-xs font-semibold text-gray-600">Mostrar:</span>
          <button *ngFor="let size of [10, 50, 100]" (click)="setPageSize(size)" class="btn"
            [ngClass]="pageSize === size ? 'btn-primary' : 'btn-outline'">
            {{ size }}
          </button>
          <button (click)="setPageSize(data.length)" class="btn"
            [ngClass]="pageSize === data.length ? 'btn-primary' : 'btn-outline'">
            Todos
          </button>
        </div>
        <div class="text-xs text-gray-600">
          Pagina <strong>{{ page }}</strong> de <strong>{{ totalPages }}</strong>
        </div>
      </div>

      <div class="app-table-wrap">
        <table class="app-table text-xs">
          <thead class="app-thead">
            <tr>
              <th *ngFor="let col of columns" class="app-th whitespace-nowrap">
                {{ col.label }}
              </th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of data | paginate: { itemsPerPage: pageSize, currentPage: page }" class="app-tr">
              <td *ngFor="let col of columns" class="app-td whitespace-nowrap">
                {{ row[col.fieldname] }}
              </td>
            </tr>
          </tbody>
        </table>

        <pagination-controls (pageChange)="page = $event" class="mt-4 flex justify-center">
        </pagination-controls>
      </div>
    </div>
  </ng-container>

  <ng-template #emptyData>
    <div class="app-card">
      <div class="app-card-body text-center text-gray-500">
        No se encontraron productos para el rango seleccionado.
      </div>
    </div>
  </ng-template>
</div>
