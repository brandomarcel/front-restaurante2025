<div #topAnchor></div>

<div class="sticky top-0 bg-white border-b px-4 py-3 flex justify-between items-center">
  <div>
    <h2 class="text-lg font-semibold">Órdenes en tiempo real</h2>
    <p class="text-xs text-gray-500">Actualización automática</p>
  </div>

  <div class="flex items-center gap-3">
    <div class="text-sm hidden sm:block">
      Total:
      <span *ngIf="total$ | async as total" class="font-semibold">{{ total }}</span>
    </div>

    <button *ngIf="newCount > 0"
      (click)="scrollToTop()"
      class="bg-emerald-600 text-white px-3 py-1 rounded-full text-sm">
      {{ newCount }} nueva{{ newCount>1?'s':'' }}
    </button>
  </div>
</div>

<div class="p-4">
  <input
    type="text"
    placeholder="Buscar..."
    [(ngModel)]="search"
    class="w-full sm:w-72 border rounded px-3 py-2 mb-4" />
</div>

<!-- MOBILE -->
<div class="md:hidden px-4 space-y-3">
  <app-order-card
    *ngFor="let o of orders"
    [order]="o"
    (open)="open($event)"
    (toPreparacion)="toPreparacion($event)"
    (toCerrada)="toCerrada($event)">
  </app-order-card>
</div>

<!-- DESKTOP -->
<div class="hidden md:block px-4">
  <app-order-table
    [orders]="orders"
    (open)="open($event)"
    (toPreparacion)="toPreparacion($event)"
    (toCerrada)="toCerrada($event)">
  </app-order-table>
</div>

<app-order-modal
  *ngIf="selectedOrder"
  [order]="selectedOrder"
  (close)="closeModal()">
</app-order-modal>
