<div class="border rounded-lg p-4 shadow-sm"
     [ngClass]="{
       'bg-sky-50 border-sky-300': order.status==='Ingresada',
       'bg-amber-50 border-amber-300': order.status==='Preparación',
       'bg-emerald-50 border-emerald-300': order.status==='Cerrada'
     }">

  <div class="flex justify-between items-center">
    <div class="text-sm font-semibold">
      #{{ order.name }}
    </div>
    <span class="text-xs font-medium">
      {{ order.status }}
    </span>
  </div>

  <div class="mt-2 text-right font-bold">
    {{ order.total | currency:'USD' }}
  </div>

  <div class="mt-3 flex gap-2">
    <button (click)="open.emit(order)"
      class="border px-3 py-1 text-xs rounded">
      Detalle
    </button>

    <button *ngIf="order.status==='Ingresada'"
      (click)="toPreparacion.emit(order)"
      class="bg-amber-500 text-white px-3 py-1 text-xs rounded">
      Preparación
    </button>

    <button *ngIf="order.status==='Preparación'"
      (click)="toCerrada.emit(order)"
      class="bg-sky-600 text-white px-3 py-1 text-xs rounded">
      Cerrar
    </button>
  </div>
</div>
