<article class="rounded-xl border border-primary/10 bg-white p-4 shadow-sm transition hover:shadow-md">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0">
      <p class="truncate text-sm font-semibold text-gray-900">{{ order.name }}</p>
      <p class="text-xs text-muted-foreground">{{ order.customer.nombre || 'Consumidor final' }}</p>
    </div>

    <span class="badge" [ngClass]="{
      'badge-red': order.status === 'Ingresada',
      'badge-yellow': order.status === 'Preparación',
      'badge-green': order.status === 'Cerrada',
      'badge-gray': order.status !== 'Ingresada' && order.status !== 'Preparación' && order.status !== 'Cerrada'
    }">
      {{ order.status }}
    </span>
  </div>

  <div class="mt-3 grid grid-cols-2 gap-2 text-xs text-muted-foreground">
    <p>Fecha: <span class="font-medium text-gray-700">{{ (order.createdAtISO || order.createdAt) | date:'dd/MM HH:mm' }}</span></p>
    <p class="text-right">Tipo: <span class="font-medium text-gray-700">{{ order.type || 'Nota Venta' }}</span></p>
  </div>

  <div class="mt-3 rounded-lg bg-primary/5 px-3 py-2 text-right">
    <p class="text-[11px] uppercase tracking-wide text-muted-foreground">Total</p>
    <p class="text-lg font-bold text-primary">{{ order.total | currency:'USD':'symbol':'1.2-2' }}</p>
  </div>

  <div class="mt-4 flex gap-2">
    <button (click)="open.emit(order)" type="button" class="btn btn-outline flex-1">Detalle</button>

    <button
      *ngIf="allowActions && order.status === 'Ingresada'"
      type="button"
      (click)="toPreparacion.emit(order)"
      class="btn bg-amber-500 text-white hover:bg-amber-600">
      Preparacion
    </button>

    <button
      *ngIf="allowActions && order.status === 'Preparación'"
      type="button"
      (click)="toCerrada.emit(order)"
      class="btn bg-emerald-600 text-white hover:bg-emerald-700">
      Marcar lista
    </button>
  </div>
</article>
