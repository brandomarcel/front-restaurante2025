<article class="rounded-lg border p-2.5 shadow-sm" [ngClass]="borderClass()">
  <div class="flex items-start justify-between gap-2">
    <div class="min-w-0">
      <div class="flex items-center gap-2">
        <p class="truncate text-sm font-bold text-gray-900">{{ order.alias || order.name }}</p>
        <span class="badge !px-1.5 !py-[2px] !text-[10px]" [ngClass]="badgeClass()">{{ order.status }}</span>
      </div>

      <p class="mt-0.5 truncate text-[11px] text-gray-700">{{ order.customer.nombre || 'Consumidor final' }}</p>
      <p class="text-[10px] text-muted-foreground">{{ order.name }}</p>
    </div>

    <div class="text-right">
      <p class="text-lg font-extrabold leading-none text-gray-900">{{ minutes }}<span class="ml-1 text-[10px] font-semibold text-gray-500">min</span></p>
      <p class="text-[10px] font-semibold" [ngClass]="urgencyClass()">{{ urgencyText() }}</p>
    </div>
  </div>

  <div class="mt-2 rounded-md bg-white/80 p-2">
    <div class="mb-1 flex items-center justify-between">
      <p class="text-[10px] font-semibold uppercase tracking-wide text-muted-foreground">Items</p>
      <p class="text-[10px] font-semibold text-gray-600">{{ order.items.length || 0 }}</p>
    </div>

    <div class="max-h-24 space-y-1 overflow-auto pr-1">
      <div *ngFor="let it of visibleItems" class="flex items-start justify-between gap-2">
        <div class="min-w-0 text-xs font-medium text-gray-900">
          <span class="mr-1 font-bold">{{ getItemQty(it) }}x</span>
          <span class="truncate">{{ getItemName(it) }}</span>
        </div>
      </div>

      <p *ngIf="remainingItems > 0" class="text-[10px] text-muted-foreground">+{{ remainingItems }} item(s) mas...</p>
      <p *ngIf="(order.items?.length ?? 0) === 0" class="text-xs text-muted-foreground">Sin items.</p>
    </div>
  </div>

  <div class="mt-2 flex items-center justify-end gap-1.5">
      <button
        type="button"
        (click)="open.emit(order)"
        class="btn btn-outline !px-2 !py-1 !text-[11px]">
        Detalle
      </button>

      <button
        *ngIf="allowActions && order.status === 'Ingresada'"
        type="button"
        (click)="toPreparacion.emit(order)"
        class="btn !px-2 !py-1 !text-[11px] bg-amber-500 text-white hover:bg-amber-600">
        Preparar
      </button>

      <button
        *ngIf="allowActions && order.status === 'Preparación'"
        type="button"
        (click)="toCerrada.emit(order)"
        class="btn !px-2 !py-1 !text-[11px] bg-emerald-600 text-white hover:bg-emerald-700">
        Lista
      </button>
  </div>
</article>
